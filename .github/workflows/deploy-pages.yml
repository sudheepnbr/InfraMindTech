name: Deploy Static Site

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build static site (frontend only)
        run: |
          mkdir -p _site
          cp index.html _site/
          cp about.html services.html products.html contact.html solutions.html industries.html resources.html _site/
          cp -r about services products contact solutions industries resources css js data partials images _site/
          if [ -d assets ]; then cp -r assets _site/; fi
          touch _site/.nojekyll

      - name: Publish to GitHub Pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
