<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — InfraMindTech CMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="admin.css?v=2" rel="stylesheet">
</head>
<body class="admin-login">

  <!-- LOGIN ONLY (shown before auth) -->
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <div class="login-logo"><i class="fa-solid fa-brain"></i></div>
      <h1>InfraMindTech CMS</h1>
      <p>Sign in to manage your website</p>
      <form id="loginForm">
        <div class="form-field">
          <label for="username">Username</label>
          <input type="text" id="username" required autocomplete="username" placeholder="admin">
        </div>
        <div class="form-field">
          <label for="password">Password</label>
          <input type="password" id="password" required autocomplete="current-password" placeholder="Enter password">
        </div>
        <div id="loginError" class="error-msg" hidden></div>
        <button type="submit" class="btn-save">Sign In <i class="fa-solid fa-arrow-right"></i></button>
      </form>
    </div>
  </div>

  <!-- ADMIN PANEL (shown after login) -->
  <div id="dashboard" class="dashboard is-hidden">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <i class="fa-solid fa-brain"></i>
        <span>InfraMind CMS</span>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-label">Global</div>
        <button class="nav-item active" data-section="site"><i class="fa-solid fa-gear"></i> Site Settings</button>
        <button class="nav-item" data-section="header"><i class="fa-solid fa-bars"></i> Header / Navbar</button>
        <button class="nav-item" data-section="footer"><i class="fa-solid fa-shoe-prints"></i> Footer</button>
        <button class="nav-item" data-section="media"><i class="fa-solid fa-photo-film"></i> Photos &amp; Videos</button>

        <div class="nav-divider"></div>
        <div class="nav-label">Pages</div>
        <button class="nav-item" data-section="home"><i class="fa-solid fa-house"></i> Home Page</button>
        <button class="nav-item" data-section="about"><i class="fa-solid fa-building"></i> About Page</button>
        <button class="nav-item" data-section="services"><i class="fa-solid fa-cloud"></i> Services Page</button>
        <button class="nav-item" data-section="products"><i class="fa-solid fa-box"></i> Products Page</button>
        <button class="nav-item" data-section="contact"><i class="fa-solid fa-envelope"></i> Contact Page</button>

        <div class="nav-divider"></div>
        <div class="nav-label">Content Blocks</div>
        <button class="nav-item" data-section="services_list"><i class="fa-solid fa-list"></i> Services</button>
        <button class="nav-item" data-section="products_list"><i class="fa-solid fa-cubes"></i> Products</button>
        <button class="nav-item" data-section="testimonials"><i class="fa-solid fa-quote-left"></i> Testimonials</button>
        <button class="nav-item" data-section="faq"><i class="fa-solid fa-circle-question"></i> FAQ</button>
        <button class="nav-item" data-section="pricing"><i class="fa-solid fa-tags"></i> Pricing Plans</button>
      </nav>
      <div class="sidebar-footer">
        <a href="/" target="_blank" class="btn-preview"><i class="fa-solid fa-external-link"></i> View Website</a>
        <button id="logoutBtn" class="btn-logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div>
          <h2 id="sectionTitle">Site Settings</h2>
          <p id="sectionHint" class="section-hint" style="margin:0"></p>
        </div>
        <button id="saveBtn" class="btn-save"><i class="fa-solid fa-floppy-disk"></i> Save Changes</button>
      </header>

      <div id="saveToast" class="toast is-hidden">
        <i class="fa-solid fa-check-circle"></i> Content saved successfully!
      </div>

      <div id="editorPanel" class="editor-panel"></div>
    </main>
  </div>

  <script src="admin.js?v=2"></script>
</body>
</html>
