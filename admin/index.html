<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visual Editor — InfraMindTech CMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="admin.css?v=4" rel="stylesheet">
</head>
<body class="admin-login">

  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <div class="login-logo"><i class="fa-solid fa-brain"></i></div>
      <h1>InfraMindTech CMS</h1>
      <p>Visual editor — click any text on the site to edit</p>
      <form id="loginForm">
        <div class="form-field">
          <label for="username">Username</label>
          <input type="text" id="username" required autocomplete="username" placeholder="admin">
        </div>
        <div class="form-field">
          <label for="password">Password</label>
          <input type="password" id="password" required autocomplete="current-password" placeholder="Enter password">
        </div>
        <div id="loginError" class="error-msg" hidden></div>
        <button type="submit" class="btn-save">Sign In <i class="fa-solid fa-arrow-right"></i></button>
      </form>
    </div>
  </div>

  <div id="dashboard" class="dashboard visual-dashboard is-hidden">
    <aside class="sidebar visual-sidebar">
      <div class="sidebar-brand">
        <i class="fa-solid fa-wand-magic-sparkles"></i>
        <span>Visual Editor</span>
      </div>
      <p class="sidebar-tip"><i class="fa-solid fa-hand-pointer"></i> Hover text or logo — click to edit. Click the hero video area to upload. Save All to publish.</p>
      <nav class="sidebar-nav" id="pageNav"></nav>
      <div class="sidebar-content-actions">
        <p class="nav-label">Add / Remove</p>
        <button type="button" id="addServiceBtn" class="btn-content-action"><i class="fa-solid fa-plus"></i> Add Service</button>
        <button type="button" id="addProductBtn" class="btn-content-action"><i class="fa-solid fa-plus"></i> Add Product</button>
        <button type="button" id="manageStatsBtn" class="btn-content-action"><i class="fa-solid fa-chart-simple"></i> Manage Stats</button>
        <button type="button" id="manageFaqsBtn" class="btn-content-action"><i class="fa-solid fa-circle-question"></i> Manage FAQs</button>
      </div>
      <div class="sidebar-footer">
        <button type="button" id="manageServicesBtn" class="btn-preview"><i class="fa-solid fa-list"></i> All Services</button>
        <button type="button" id="manageProductsBtn" class="btn-preview"><i class="fa-solid fa-cubes"></i> All Products</button>
        <button type="button" id="mediaBtn" class="btn-preview"><i class="fa-solid fa-photo-film"></i> Media Library</button>
        <a href="/" target="_blank" class="btn-preview"><i class="fa-solid fa-external-link"></i> View Live Site</a>
        <button id="logoutBtn" class="btn-logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
      </div>
    </aside>

    <main class="visual-main">
      <header class="visual-topbar">
        <div class="visual-topbar-left">
          <h2 id="currentPageLabel">Home</h2>
          <span class="edit-mode-badge"><i class="fa-solid fa-pen"></i> Edit mode</span>
        </div>
        <div class="visual-topbar-actions">
          <span id="unsavedBadge" class="unsaved-badge is-hidden">Unsaved changes</span>
          <div class="topbar-manage-group">
            <button type="button" id="topAddServiceBtn" class="btn-toolbar" title="Add a new service"><i class="fa-solid fa-plus"></i> Service</button>
            <button type="button" id="topAddProductBtn" class="btn-toolbar" title="Add a new product"><i class="fa-solid fa-plus"></i> Product</button>
            <button type="button" id="topManageStatsBtn" class="btn-toolbar" title="Add or remove stats"><i class="fa-solid fa-chart-simple"></i> Stats</button>
          </div>
          <button id="saveBtn" class="btn-save"><i class="fa-solid fa-floppy-disk"></i> Save All</button>
        </div>
      </header>

      <div class="preview-wrap">
        <iframe id="sitePreview" title="Site preview" class="site-preview"></iframe>
      </div>
    </main>

    <aside id="editDrawer" class="edit-drawer is-hidden">
      <div class="edit-drawer-header">
        <h3 id="editDrawerTitle">Edit content</h3>
        <button type="button" id="closeDrawer" class="drawer-close" aria-label="Close"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div id="editDrawerBody" class="edit-drawer-body"></div>
      <div class="edit-drawer-footer">
        <button type="button" id="deleteEdit" class="btn-danger is-hidden"><i class="fa-solid fa-trash"></i> Delete</button>
        <button type="button" id="cancelEdit" class="btn-secondary">Cancel</button>
        <button type="button" id="applyEdit" class="btn-save">Apply</button>
      </div>
    </aside>
  </div>

  <div id="listModal" class="media-modal is-hidden">
    <div class="media-modal-backdrop" id="listModalBackdrop"></div>
    <div class="media-modal-panel list-modal-panel">
      <div class="edit-drawer-header">
        <h3 id="listModalTitle"><i class="fa-solid fa-list"></i> Manage Items</h3>
        <button type="button" id="closeListModal" class="drawer-close" aria-label="Close"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div id="listModalBody" class="media-modal-body"></div>
    </div>
  </div>

  <div id="mediaModal" class="media-modal is-hidden">
    <div class="media-modal-backdrop" id="mediaModalBackdrop"></div>
    <div class="media-modal-panel">
      <div class="edit-drawer-header">
        <h3><i class="fa-solid fa-photo-film"></i> Media Library</h3>
        <button type="button" id="closeMediaModal" class="drawer-close" aria-label="Close"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div id="mediaModalBody" class="media-modal-body"></div>
    </div>
  </div>

  <div id="saveToast" class="toast is-hidden"></div>

  <script src="admin.js?v=11"></script>
</body>
</html>
